<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CeleCircle — Talent Social Network</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/feed.css">
    <link rel="stylesheet" href="/static/common.css">
</head>
<body>
    <script src="/static/linkedin-header.js"></script>

    <main class="page-container" style="max-width: 800px; margin: 2rem auto;">
        <div class="card">
            <h1 class="card-title text-center">Complete Your Profile</h1>
            <p class="text-center text-secondary" style="margin-bottom: 2rem;">
                Let's get you started! Please provide some important information about yourself.
            </p>
            
            <form id="setupProfileForm">
                <!-- Form will be dynamically generated by JavaScript based on user role -->
                <div class="loading">Loading form...</div>
            </form>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        let userRole = 'artist';
        
        document.addEventListener('DOMContentLoaded', () => {
            initHeader();
            
            // Check if user is authenticated
            if (!isAuthenticated()) {
                window.location.href = '/login';
                return;
            }
            
            // Get user role
            const user = getCurrentUser();
            if (user) {
                userRole = user.role;
                renderProfileForm(userRole);
            }
            
            // Check if user already has a profile
            checkExistingProfile();
        });
        
        function renderProfileForm(role) {
            const form = document.getElementById('setupProfileForm');
            if (!form) return;
            
            const isOrganizer = role === 'organizer';
            const user = getCurrentUser();
            const fullName = user && user.first_name && user.last_name
                ? `${user.first_name} ${user.last_name}`
                : '';
            
            // Clear existing form content
            form.innerHTML = '';
            
            let formHTML = '<div class="grid grid-2">';
            
            // Common fields
            formHTML += `
                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <input type="text" class="form-input" name="name" required placeholder="Enter your full name" value="${fullName}">
                </div>
            `;
            
            // Category or Looking for field
            if (isOrganizer) {
                formHTML += `
                    <div class="form-group">
                        <label class="form-label">Looking for *</label>
                        <input type="text" class="form-input" name="category" required placeholder="Singers, Dancers, Actors, etc.">
                        <small class="text-secondary">What type of talent are you looking for?</small>
                    </div>
                `;
            } else {
                formHTML += `
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <input type="text" class="form-input" name="category" required placeholder="Singer, Dancer, Actor, etc.">
                        <small class="text-secondary">What type of artist are you?</small>
                    </div>
                `;
            }
            
            formHTML += `
                <div class="form-group">
                    <label class="form-label">Location *</label>
                    <input type="text" class="form-input" name="location" required placeholder="City, Country">
                    <small class="text-secondary">Where are you based?</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone Number *</label>
                    <input type="tel" class="form-input" name="phone" required placeholder="+1234567890">
                    <small class="text-secondary">For bookings and contact</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Languages</label>
                    <input type="text" class="form-input" name="languages" placeholder="English, Hindi, Spanish, etc.">
                    <small class="text-secondary">${isOrganizer ? 'Languages required for events' : 'Languages you can perform in'}</small>
                </div>
                <div class="form-group">
                    <label class="form-label">Experience (Years)</label>
                    <input type="number" class="form-input" name="experience_years" min="0" placeholder="0">
                    <small class="text-secondary">${isOrganizer ? 'Years of experience organizing events' : 'Years of experience'}</small>
                </div>
            `;
            
            // Price fields only for artists
            if (!isOrganizer) {
                formHTML += `
                    <div class="form-group">
                        <label class="form-label">Min Price ($)</label>
                        <input type="number" class="form-input" name="min_price" step="0.01" min="0" placeholder="0">
                        <small class="text-secondary">Minimum booking price</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Max Price ($)</label>
                        <input type="number" class="form-input" name="max_price" step="0.01" min="0" placeholder="0">
                        <small class="text-secondary">Maximum booking price</small>
                    </div>
                `;
            }
            
            formHTML += '</div>';
            
            // Bio field
            formHTML += `
                <div class="form-group">
                    <label class="form-label">Bio</label>
                    <textarea class="form-textarea" name="bio" rows="4" placeholder="${isOrganizer ? 'Tell us about your organization, events you organize, and what you\'re looking for...' : 'Tell us about yourself, your experience, and what makes you unique...'}"></textarea>
                    <small class="text-secondary">A brief description about ${isOrganizer ? 'your organization' : 'yourself'}</small>
                </div>
            `;
            
            // Submit button
            formHTML += `
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Complete Profile & Continue
                </button>
            `;
            
            form.innerHTML = formHTML;
            
            // Re-attach event listener
            form.addEventListener('submit', handleFormSubmit);
        }
        
        async function checkExistingProfile() {
            try {
                const profile = await apiRequest('/users/profiles/me');
                // If profile exists, redirect to feed
                window.location.href = '/feed';
            } catch (error) {
                // Profile doesn't exist, which is expected - show the form
                if (error.status !== 404) {
                    console.error('Error checking profile:', error);
                }
            }
        }
        
        async function handleFormSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const user = getCurrentUser();
            const isOrganizer = user && user.role === 'organizer';
            
            // Convert price strings to numbers (only for artists)
            if (!isOrganizer) {
                data.min_price = parseFloat(data.min_price) || 0;
                data.max_price = parseFloat(data.max_price) || 0;
            } else {
                // Set to 0 for organizers (not used)
                data.min_price = 0;
                data.max_price = 0;
            }
            data.experience_years = parseInt(data.experience_years) || 0;
            
            // Validate required fields
            if (!data.name || !data.category || !data.location || !data.phone) {
                showNotification('Please fill in all required fields (marked with *)', 'error');
                return;
            }
            
            try {
                await apiRequest('/users/profiles', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                showNotification('Profile created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = '/feed';
                }, 1000);
            } catch (error) {
                showNotification(error.message || 'Error creating profile. Please try again.', 'error');
            }
        }
    </script>
</body>
</html>
