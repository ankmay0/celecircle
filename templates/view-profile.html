<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CeleCircle</title>
    <link rel="stylesheet" href="/static/style.css?v=20260217">
    <link rel="stylesheet" href="/static/feed.css?v=20260217">
    <link rel="stylesheet" href="/static/common.css?v=20260217">
    <style>
        .vp-shell {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* ── Two-column layout ── */
        .vp-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            align-items: start;
        }
        @media (min-width: 1024px) {
            .vp-layout { grid-template-columns: repeat(12, minmax(0, 1fr)); }
        }
        .vp-main { min-width: 0; }
        @media (min-width: 1024px) {
            .vp-main { grid-column: span 8 / span 8; }
            .vp-sidebar { grid-column: span 4 / span 4; }
        }

        /* ── Compact profile header ── */
        .vp-hero {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #f3f4f6;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .vp-hero-banner {
            height: 100px;
            background: linear-gradient(135deg, #0a66c2 0%, #004182 50%, #00a0dc 100%);
            position: relative;
            border-radius: 16px 16px 0 0;
        }
        .vp-hero-body {
            padding: 0 2rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: -40px;
            position: relative;
            z-index: 1;
        }
        .vp-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0a66c2, #00a0dc);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 2.2rem;
            border: 4px solid #fff;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .vp-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .vp-identity { flex: 1; min-width: 0; padding-bottom: 0; display: flex; flex-direction: column; row-gap: 0.25rem; }
        .vp-name { font-size: 1.35rem; font-weight: 700; color: #111; margin: 8px 0 0; line-height: 1.3; }
        .vp-tagline { font-size: 0.875rem; color: #64748b; margin: 0; }
        .vp-meta { font-size: 0.78rem; color: #888; margin-top: 2px; }

        /* Profile quick info below name */
        .vp-quick-info {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .vp-quick-item {
            font-size: 0.82rem;
            color: #444;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .vp-quick-item .icon { font-size: 0.9rem; }
        .vp-price-highlight {
            font-weight: 700;
            color: #0a66c2;
        }

        /* Action buttons */
        .vp-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 12px; padding: 0 2rem 1rem; }
        .vp-actions .btn { white-space: nowrap; font-size: 0.85rem; padding: 0.5rem 1.25rem; border-radius: 20px; }
        .btn-book { background: #0a66c2; color: #fff; font-weight: 700; }
        .btn-book:hover { background: #004182; }
        .btn-enquiry { background: #fff; color: #0a66c2; border: 1.5px solid #0a66c2; font-weight: 600; }
        .btn-enquiry:hover { background: #e8f0fe; }

        /* Trust indicators */
        .vp-trust {
            display: flex;
            gap: 1.5rem;
            padding: 0.75rem 2rem;
            border-top: 1px solid #f0f0f0;
            flex-wrap: wrap;
        }
        .vp-trust-item { font-size: 0.78rem; color: #555; display: flex; align-items: center; gap: 4px; }
        .vp-trust-item .check { color: #10b981; font-weight: 700; }

        /* Quick stats row */
        .vp-stats-row { display: flex; justify-content: space-between; align-items: stretch; border-top: 1px solid #f0f0f0; padding: 0.75rem 2rem; gap: 1rem; }
        .vp-stat { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .vp-stat-val { font-size: 1.05rem; font-weight: 700; color: #0a66c2; }
        .vp-stat-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.3px; }

        /* Collapsible info */
        .vp-info-toggle {
            display: flex; align-items: center; justify-content: center;
            padding: 0.5rem; border-top: 1px solid #f0f0f0;
            cursor: pointer; font-size: 0.82rem; color: #0a66c2;
            font-weight: 600; transition: background 0.15s; user-select: none;
        }
        .vp-info-toggle:hover { background: #f3f6f9; }
        .vp-info-panel { display: none; padding: 1rem 2rem; border-top: 1px solid #f0f0f0; background: #fafbfc; }
        .vp-info-panel.open { display: block; }
        .vp-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .vp-info-grid strong { font-size: 0.78rem; color: #666; display: block; }
        .vp-info-grid p { margin: 2px 0 0; font-size: 0.88rem; color: #222; }

        /* ── Sticky Booking Card (Right Sidebar) ── */
        .vp-sidebar { position: sticky; top: 72px; }
        .booking-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #f3f4f6;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .booking-card-header {
            background: linear-gradient(135deg, #0a66c2 0%, #004182 50%, #00a0dc 100%);
            color: #fff;
            padding: 14px 18px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .booking-card-body { padding: 24px; }
        .bc-field { margin-bottom: 14px; }
        .bc-field label { display: block; text-align: left; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 6px; }
        .bc-field input,
        .bc-field select {
            width: 100%; height: 42px; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 10px;
            font-size: 0.85rem; background: #fff; color: #111; box-sizing: border-box;
        }
        .bc-field input:focus, .bc-field select:focus { outline: none; border-color: #0a66c2; box-shadow: 0 0 0 2px rgba(10,102,194,0.15); }

        /* Price breakdown */
        .bc-price-box {
            background: #f8f9fa; border-radius: 8px; padding: 14px;
            margin: 14px 0; border: 1px solid #e8e8e8;
        }
        .bc-price-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #444; padding: 4px 0; }
        .bc-price-row span:first-child { text-align: left; flex: 1; }
        .bc-price-row span:last-child { text-align: right; min-width: 110px; font-variant-numeric: tabular-nums; }
        .bc-price-row.total { font-weight: 700; color: #111; font-size: 0.95rem; border-top: 1px solid #ddd; padding-top: 10px; margin-top: 6px; }
        .bc-advance-box {
            background: #e8f5e9; border-radius: 6px; padding: 10px 14px;
            margin: 10px 0; font-size: 0.82rem; color: #2e7d32;
        }
        .bc-advance-box strong { color: #1b5e20; }

        /* Trust badges in card */
        .bc-trust { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
        .bc-trust-item { font-size: 0.78rem; color: #555; display: flex; align-items: center; gap: 6px; }
        .bc-trust-item .icon { color: #10b981; }

        .bc-submit-btn {
            width: 100%; padding: 12px; background: #0a66c2; color: #fff;
            border: none; border-radius: 8px; font-size: 0.92rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s;
        }
        .bc-submit-btn:hover { background: #004182; }
        .bc-submit-btn:disabled { background: #ccc; cursor: default; }

        /* Add-on item styling */
        .bc-addon-list { display: flex; flex-direction: column; gap: 8px; }
        .bc-addon-item {
            display: flex; align-items: center; gap: 8px; padding: 10px 12px;
            background: #f8f9fa; border: 1px solid #e8e8e8; border-radius: 8px;
            cursor: pointer; transition: border-color 0.15s, background 0.15s;
            font-size: 0.85rem;
        }
        .bc-addon-item:hover { border-color: #0a66c2; background: #f0f6ff; }
        .bc-addon-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #0a66c2; flex-shrink: 0; cursor: pointer; }
        .bc-addon-label { flex: 1; font-weight: 600; color: #333; }
        .bc-addon-price { font-weight: 700; color: #0a66c2; white-space: nowrap; }

        /* ── Media Wall ── */
        .mw-section { background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; overflow: hidden; }
        .mw-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; border-bottom: 1px solid #e8e8e8; }
        .mw-title { font-size: 1.1rem; font-weight: 700; margin: 0; color: #111; }
        .mw-count { font-size: 0.82rem; color: #666; font-weight: 400; margin-left: 0.5rem; }
        .mw-tabs { display: flex; gap: 0; }
        .mw-tab { padding: 0.45rem 1rem; border: none; background: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; color: #666; border-radius: 20px; transition: all 0.15s; }
        .mw-tab:hover { background: #f0f0f0; }
        .mw-tab.active { background: #0a66c2; color: #fff; }
        .mw-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; }
        .mw-item { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer; border-radius: 2px; background: #f0f0f0; }
        .mw-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.25s ease; }
        .mw-item:hover img { transform: scale(1.05); }
        .mw-item video { width: 100%; height: 100%; object-fit: cover; }
        .mw-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.25); transition: background 0.2s; }
        .mw-item:hover .mw-play-overlay { background: rgba(0,0,0,0.4); }
        .mw-play-btn { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
        .mw-play-btn::after { content: ''; display: block; width: 0; height: 0; border-style: solid; border-width: 10px 0 10px 18px; border-color: transparent transparent transparent #0a66c2; margin-left: 3px; }
        .mw-caption-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 8px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.65)); color: #fff; font-size: 0.72rem; line-height: 1.3; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .mw-item:hover .mw-caption-overlay { opacity: 1; }
        .mw-engagement { display: flex; gap: 8px; margin-top: 4px; font-size: 0.68rem; opacity: 0.9; }
        .mw-text-item { aspect-ratio: 1; display: flex; flex-direction: column; justify-content: center; padding: 1rem; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; cursor: pointer; border-radius: 2px; transition: transform 0.2s; }
        .mw-text-item:hover { transform: scale(1.02); }
        .mw-text-content { font-size: 0.82rem; line-height: 1.5; overflow: hidden; display: -webkit-box; line-clamp: 6; -webkit-line-clamp: 6; -webkit-box-orient: vertical; }
        .mw-text-date { font-size: 0.68rem; opacity: 0.7; margin-top: auto; padding-top: 6px; }
        .mw-loading { padding: 3rem; text-align: center; color: #999; }
        .mw-spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #0a66c2; border-radius: 50%; animation: mw-spin 0.8s linear infinite; }
        @keyframes mw-spin { to { transform: rotate(360deg); } }
        .mw-empty { padding: 4rem 2rem; text-align: center; }
        .mw-empty-icon { font-size: 3.5rem; margin-bottom: 0.75rem; opacity: 0.4; }
        .mw-empty-title { font-size: 1.05rem; font-weight: 600; color: #444; margin-bottom: 0.35rem; }
        .mw-empty-sub { font-size: 0.85rem; color: #999; }

        /* ── Lightbox ── */
        .lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .lightbox-overlay.open { display: flex; }
        .lightbox-close { position: absolute; top: 16px; right: 20px; font-size: 2rem; color: #fff; cursor: pointer; background: none; border: none; z-index: 10; line-height: 1; opacity: 0.8; transition: opacity 0.15s; }
        .lightbox-close:hover { opacity: 1; }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); font-size: 2.2rem; color: #fff; cursor: pointer; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; z-index: 10; }
        .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
        .lightbox-prev { left: 16px; }
        .lightbox-next { right: 16px; }
        .lightbox-media { max-width: 90vw; max-height: 80vh; border-radius: 4px; }
        .lightbox-media img { max-width: 90vw; max-height: 80vh; object-fit: contain; border-radius: 4px; }
        .lightbox-media video { max-width: 90vw; max-height: 80vh; border-radius: 4px; outline: none; }
        .lightbox-info { color: #ddd; text-align: center; margin-top: 12px; max-width: 600px; }
        .lightbox-caption { font-size: 0.92rem; line-height: 1.5; margin-bottom: 4px; }
        .lightbox-meta { font-size: 0.78rem; color: #aaa; }

        /* ── Multi-step Booking Modal ── */
        .booking-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            z-index: 5000; display: none; align-items: center; justify-content: center;
        }
        .booking-modal-overlay.open { display: flex; }
        .booking-modal {
            background: #fff; border-radius: 12px; width: 560px; max-width: 95vw;
            max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .bm-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px; border-bottom: 1px solid #e0e0e0;
        }
        .bm-header h2 { margin: 0; font-size: 1.15rem; font-weight: 700; color: #111; }
        .bm-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .bm-close:hover { background: #f0f0f0; }

        /* Progress indicator */
        .bm-progress { display: flex; align-items: center; justify-content: center; gap: 0; padding: 16px 24px; }
        .bm-step-dot {
            width: 28px; height: 28px; border-radius: 50%; background: #e0e0e0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; color: #888; transition: all 0.2s;
        }
        .bm-step-dot.active { background: #0a66c2; color: #fff; }
        .bm-step-dot.done { background: #10b981; color: #fff; }
        .bm-step-line { width: 60px; height: 2px; background: #e0e0e0; transition: background 0.2s; }
        .bm-step-line.done { background: #10b981; }
        .bm-step-label { font-size: 0.68rem; color: #888; text-align: center; margin-top: 4px; }

        .bm-body { padding: 0 24px 24px; }
        .bm-step { display: none; }
        .bm-step.active { display: block; }

        .bm-field { margin-bottom: 14px; }
        .bm-field label { display: block; font-size: 0.82rem; font-weight: 600; color: #333; margin-bottom: 5px; }
        .bm-field input, .bm-field select, .bm-field textarea {
            width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 0.88rem; background: #fff; box-sizing: border-box;
        }
        .bm-field input:focus, .bm-field select:focus, .bm-field textarea:focus { outline: none; border-color: #0a66c2; }
        .bm-field textarea { resize: vertical; min-height: 80px; }

        .bm-footer { display: flex; justify-content: space-between; gap: 12px; padding: 16px 24px; border-top: 1px solid #e0e0e0; }
        .bm-btn { padding: 10px 24px; border-radius: 20px; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
        .bm-btn-primary { background: #0a66c2; color: #fff; }
        .bm-btn-primary:hover { background: #004182; }
        .bm-btn-secondary { background: #f0f0f0; color: #444; }
        .bm-btn-secondary:hover { background: #e0e0e0; }
        .bm-btn-success { background: #10b981; color: #fff; }
        .bm-btn-success:hover { background: #059669; }

        /* Responsive */
        @media (max-width: 900px) {
            .vp-layout { grid-template-columns: 1fr; }
            .vp-sidebar { position: static; }
        }
        @media (max-width: 768px) {
            .vp-hero-body { flex-wrap: wrap; margin-top: -30px; padding: 0 1rem 1rem; }
            .vp-avatar { width: 70px; height: 70px; font-size: 1.8rem; }
            .vp-actions { padding: 0 1rem 1rem; }
            .vp-stats-row { padding: 0.6rem 1rem; gap: 0.5rem; flex-wrap: wrap; }
            .vp-stat { min-width: calc(50% - 0.25rem); }
            .vp-info-grid { grid-template-columns: 1fr; }
            .mw-grid { grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
            .lightbox-nav { width: 36px; height: 36px; font-size: 1.5rem; }
        }
        @media (max-width: 480px) {
            .mw-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <script src="/static/linkedin-header.js"></script>

    <main class="page-container">
        <div id="profileContent">
            <div class="loading">Loading profile...</div>
        </div>
    </main>

    <!-- Lightbox / Media Viewer -->
    <div class="lightbox-overlay" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">&#8249;</button>
        <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">&#8250;</button>
        <div class="lightbox-media" id="lightboxMedia"></div>
        <div class="lightbox-info" id="lightboxInfo"></div>
    </div>

    <!-- Multi-Step Booking Modal -->
    <div class="booking-modal-overlay" id="bookingModalOverlay">
        <div class="booking-modal">
            <div class="bm-header">
                <h2 id="bmTitle">Book Artist</h2>
                <button class="bm-close" onclick="closeBookingModal()">&times;</button>
            </div>
            <!-- Progress -->
            <div class="bm-progress" id="bmProgress">
                <div>
                    <div class="bm-step-dot active" id="dot1">1</div>
                    <div class="bm-step-label">Details</div>
                </div>
                <div class="bm-step-line" id="line1"></div>
                <div>
                    <div class="bm-step-dot" id="dot2">2</div>
                    <div class="bm-step-label">Summary</div>
                </div>
                <div class="bm-step-line" id="line2"></div>
                <div>
                    <div class="bm-step-dot" id="dot3">3</div>
                    <div class="bm-step-label">Pay</div>
                </div>
                <div class="bm-step-line" id="line3"></div>
                <div>
                    <div class="bm-step-dot" id="dot4">4</div>
                    <div class="bm-step-label">Confirm</div>
                </div>
            </div>
            <div class="bm-body">
                <!-- Step 1: Event Details -->
                <div class="bm-step active" id="bmStep1">
                    <div class="bm-field">
                        <label>Event Date *</label>
                        <input type="date" id="bmEventDate" required>
                    </div>
                    <div class="bm-field">
                        <label>Event Type *</label>
                        <select id="bmEventType">
                            <option value="">Select event type...</option>
                            <option value="Wedding">Wedding</option>
                            <option value="Corporate Event">Corporate Event</option>
                            <option value="Birthday Party">Birthday Party</option>
                            <option value="Concert">Concert</option>
                            <option value="Festival">Festival</option>
                            <option value="Private Party">Private Party</option>
                            <option value="College Event">College Event</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="bm-field">
                        <label>Location *</label>
                        <input type="text" id="bmLocation" placeholder="Event venue / city">
                    </div>
                    <div class="bm-field">
                        <label>Duration</label>
                        <select id="bmDuration">
                            <option value="">Select duration...</option>
                            <option value="1 Hour">1 Hour</option>
                            <option value="2 Hours">2 Hours</option>
                            <option value="3 Hours">3 Hours</option>
                            <option value="Half Day">Half Day</option>
                            <option value="Full Day">Full Day</option>
                        </select>
                    </div>
                    <div class="bm-field">
                        <label>Audience Size (Optional)</label>
                        <input type="text" id="bmAudienceSize" placeholder="e.g. 100-200 guests">
                    </div>
                    <div class="bm-field">
                        <label>Special Requirements</label>
                        <textarea id="bmDetails" placeholder="Describe any special requirements..."></textarea>
                    </div>
                    <div class="bm-field">
                        <label>Optional Add-ons</label>
                        <div class="bc-addon-list" id="bmAddonList">
                            <label class="bc-addon-item" title="Accommodation arrangements for the artist">
                                <input type="checkbox" id="bmAddonAccommodation">
                                <span class="bc-addon-label">🏨 Accommodation</span>
                                <span class="bc-addon-price" id="bmAddonAccPrice">₹5,000</span>
                            </label>
                            <label class="bc-addon-item" title="Transport arrangements for the artist">
                                <input type="checkbox" id="bmAddonTransport">
                                <span class="bc-addon-label">🚗 Transport</span>
                                <span class="bc-addon-price" id="bmAddonTrnPrice">₹3,000</span>
                            </label>
                            <label class="bc-addon-item" title="Security personnel for the event">
                                <input type="checkbox" id="bmAddonSecurity">
                                <span class="bc-addon-label">🛡️ Security</span>
                                <span class="bc-addon-price" id="bmAddonSecPrice">₹4,000</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Price Summary -->
                <div class="bm-step" id="bmStep2">
                    <div id="bmPriceSummary"></div>
                </div>

                <!-- Step 3: Payment Method -->
                <div class="bm-step" id="bmStep3">
                    <div id="bmPaymentMethod">
                        <h3 style="font-size:1rem;font-weight:700;margin:0 0 16px;text-align:center;">Choose Payment Method</h3>
                        <div style="display:flex;flex-direction:column;gap:12px;max-width:360px;margin:0 auto;">
                            <label style="display:flex;align-items:center;gap:14px;padding:16px 18px;border:2px solid #0a66c2;border-radius:10px;cursor:pointer;background:#f0f7ff;transition:all .15s;" id="pmUpiLabel">
                                <input type="radio" name="paymentMethod" value="upi" checked style="width:18px;height:18px;accent-color:#0a66c2;" onchange="selectPayMethod()">
                                <div style="font-size:1.6rem;">📱</div>
                                <div>
                                    <div style="font-weight:700;font-size:0.95rem;">UPI / PhonePe</div>
                                    <div style="font-size:0.78rem;color:#666;">Scan QR code and pay via PhonePe, GPay, Paytm</div>
                                </div>
                            </label>
                            <label style="display:flex;align-items:center;gap:14px;padding:16px 18px;border:2px solid #e0e0e0;border-radius:10px;cursor:pointer;background:#fff;transition:all .15s;" id="pmCardLabel">
                                <input type="radio" name="paymentMethod" value="card" style="width:18px;height:18px;accent-color:#0a66c2;" onchange="selectPayMethod()">
                                <div style="font-size:1.6rem;">💳</div>
                                <div>
                                    <div style="font-weight:700;font-size:0.95rem;">Credit / Debit Card</div>
                                    <div style="font-size:0.78rem;color:#666;">Visa, Mastercard, RuPay</div>
                                </div>
                            </label>
                        </div>
                        <div style="margin-top:16px;text-align:center;">
                            <div style="background:#f8f9fa;border-radius:8px;padding:12px;border:1px solid #e8e8e8;display:inline-block;">
                                <span style="font-size:0.82rem;color:#666;">Amount to pay:</span>
                                <span style="font-size:1.1rem;font-weight:800;color:#0a66c2;margin-left:6px;" id="bmPayAmountDisplay">₹0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Step 4: QR / Success -->
                <div class="bm-step" id="bmStep4">
                    <div id="bmPaymentStep"></div>
                </div>
            </div>
            <div class="bm-footer">
                <button class="bm-btn bm-btn-secondary" id="bmBackBtn" onclick="bookingStepBack()" style="display:none;">Back</button>
                <div style="flex:1;"></div>
                <button class="bm-btn bm-btn-primary" id="bmNextBtn" onclick="bookingStepNext()">Next: Review Price</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initHeader();
            loadProfile();
        });

        /* ═══════════════════════════════════════
           STATE
           ═══════════════════════════════════════ */
        let currentProfile = null;
        let currentUserId = null;
        let allMediaItems = [];
        let currentLBIndex = 0;
        let bookingStep = 1;
        let pricingData = null;

        /* ═══════════════════════════════════════
           PROFILE LOAD
           ═══════════════════════════════════════ */
        async function loadProfile() {
            if (!isAuthenticated()) { window.location.href = '/login'; return; }
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('user_id');
            const profileId = params.get('profile_id');
            if (!userId && !profileId) {
                document.getElementById('profileContent').innerHTML = '<div class="card" style="text-align:center;padding:2rem;"><p>Invalid profile link.</p><a href="/connections" class="btn btn-primary" style="margin-top:1rem;">Back to Network</a></div>';
                return;
            }
            try {
                let profile;
                if (profileId) { profile = await apiRequest('/users/profiles/' + profileId); }
                else { profile = await apiRequest('/users/profiles/user/' + userId); }
                displayProfile(profile);
            } catch (error) {
                document.getElementById('profileContent').innerHTML = '<div class="card" style="text-align:center;padding:2rem;"><p>Error loading profile.</p><a href="/connections" class="btn btn-primary" style="margin-top:1rem;">Back to Network</a></div>';
            }
        }

        /* ═══════════════════════════════════════
           DISPLAY PROFILE
           ═══════════════════════════════════════ */
        function displayProfile(profile) {
            currentProfile = profile;
            currentUserId = profile.user_id;
            const container = document.getElementById('profileContent');
            const currentUser = getCurrentUser();
            const hasFullProfile = profile.has_profile !== false && profile.id !== 0;
            const isOrganizer = profile.category && profile.category.toLowerCase().includes('looking for');
            const isArtist = hasFullProfile ? !isOrganizer : false;
            const canBook = currentUser && currentUser.role === 'organizer' && isArtist && currentUser.id !== profile.user_id;
            const canMessage = currentUser && currentUser.id !== profile.user_id;
            const initial = (profile.name || '?').charAt(0).toUpperCase();
            const photoUrl = profile && profile.profile_photo_url ? profile.profile_photo_url : null;
            const safeName = escapeHtml(profile.name || 'User');
            const safeCategory = escapeHtml(profile.category || '');
            const safeLocation = escapeHtml(profile.location || '');

            const artistFee = profile.min_price || 0;
            const displayPrice = artistFee + 3000;
            const responseHrs = profile.response_time_avg ? profile.response_time_avg.toFixed(0) : '24';

            let html = `
                <div style="margin-bottom:0.75rem;">
                    <a href="/connections" style="text-decoration:none;font-size:0.88rem;color:#0a66c2;font-weight:600;">← Back to Network</a>
                </div>
                <div class="vp-shell">
                <div class="vp-layout">
                    <div class="vp-main">
                        <!-- Hero Card -->
                        <div class="vp-hero">
                            <div class="vp-hero-banner"></div>
                            <div class="vp-hero-body">
                                <div class="vp-avatar">${photoUrl ? `<img src="${escapeHtml(photoUrl)}" alt="${safeName}">` : initial}</div>
                                <div class="vp-identity">
                                    <h1 class="vp-name">${safeName}</h1>
                                    <p class="vp-tagline">${safeCategory || 'CeleCircle Member'}</p>
                                    <div class="vp-quick-info">
                                        ${profile.average_rating ? `<span class="vp-quick-item"><span class="icon">⭐</span> ${profile.average_rating.toFixed(1)} Rating</span>` : ''}
                                        ${safeLocation ? `<span class="vp-quick-item"><span class="icon">📍</span> ${safeLocation}</span>` : ''}
                                        ${isArtist && artistFee > 0 ? `<span class="vp-quick-item"><span class="icon">💰</span> Starting From <span class="vp-price-highlight">₹${displayPrice.toLocaleString('en-IN')}</span></span>` : ''}
                                    </div>
                                </div>
                            </div>`;

            // Profile not set up notice
            if (!hasFullProfile) {
                html += `<div style="padding:12px 1.5rem;background:#fff8e1;border-top:1px solid #ffe58f;font-size:0.85rem;color:#8a6d3b;display:flex;align-items:center;gap:8px;">
                    <span>⚠️</span> This user hasn't completed their profile setup yet.
                </div>`;
            }

            // Action buttons
            if (canBook || canMessage) {
                html += '<div class="vp-actions">';
                if (canBook) html += `<button class="btn btn-book" onclick="openBookingModal()">📅 Book Now</button>`;
                if (canMessage) html += `<button class="btn btn-enquiry" onclick="messageUser(${profile.user_id}, '${profile.name.replace(/'/g, "\\'")}', '${(profile.category || '').replace(/'/g, "\\'")}')">💬 Send Enquiry</button>`;
                html += '</div>';
            }

            // Trust indicators
            if (isArtist) {
                html += `<div class="vp-trust">
                    <span class="vp-trust-item"><span class="check">✔</span> ${profile.total_hires || 0} Successful Bookings</span>
                    <span class="vp-trust-item"><span class="check">✔</span> ${profile.average_rating ? profile.average_rating.toFixed(1) : 'N/A'} Rating</span>
                    <span class="vp-trust-item"><span class="check">✔</span> Responds within ${responseHrs} hours</span>
                </div>`;
            }

            // Stats row (always 4 columns for balanced alignment)
            html += '<div class="vp-stats-row">';
            html += `<div class="vp-stat"><div class="vp-stat-val">${profile.experience_years || 0}</div><div class="vp-stat-label">Years Exp</div></div>`;
            html += `<div class="vp-stat"><div class="vp-stat-val">${profile.total_hires || 0}</div><div class="vp-stat-label">Hires</div></div>`;
            html += `<div class="vp-stat"><div class="vp-stat-val">${profile.total_reviews || 0}</div><div class="vp-stat-label">Reviews</div></div>`;
            html += `<div class="vp-stat"><div class="vp-stat-val">${profile.average_rating ? profile.average_rating.toFixed(1) + ' ⭐' : 'N/A'}</div><div class="vp-stat-label">Rating</div></div>`;
            html += '</div>';

            // Collapsible details
            html += `
                            <div class="vp-info-toggle" onclick="toggleInfoPanel()">
                                <span id="infoToggleText">Show more details ▾</span>
                            </div>
                            <div class="vp-info-panel" id="infoPanel">
                                <div class="vp-info-grid">
                                    <div><strong>Category</strong><p>${safeCategory || 'Not provided'}</p></div>
                                    <div><strong>Location</strong><p>${safeLocation || 'Not provided'}</p></div>
                                    <div><strong>Languages</strong><p>${escapeHtml(profile.languages || 'Not provided')}</p></div>
                                    <div><strong>Experience</strong><p>${profile.experience_years || 0} years</p></div>
                                    ${!isOrganizer ? `<div><strong>Price Range</strong><p>₹${(profile.min_price || 0).toLocaleString('en-IN')} – ₹${(profile.max_price || 0).toLocaleString('en-IN')}</p></div>` : ''}
                                </div>
                                ${profile.bio ? `<div style="margin-top:0.75rem;"><strong style="font-size:0.78rem;color:#666;">Bio</strong><p style="margin:4px 0 0;font-size:0.88rem;color:#222;white-space:pre-wrap;">${escapeHtml(profile.bio)}</p></div>` : ''}
                            </div>
                        </div>

                        <!-- Media Wall -->
                        <div class="mw-section">
                            <div class="mw-header">
                                <h2 class="mw-title">Photos & Videos<span class="mw-count" id="mediaCount"></span></h2>
                                <div class="mw-tabs">
                                    <button class="mw-tab active" onclick="filterMedia('all', this)">All</button>
                                    <button class="mw-tab" onclick="filterMedia('image', this)">Photos</button>
                                    <button class="mw-tab" onclick="filterMedia('video', this)">Videos</button>
                                </div>
                            </div>
                            <div id="mediaWall">
                                <div class="mw-loading"><div class="mw-spinner"></div><p style="margin-top:0.75rem;">Loading media...</p></div>
                            </div>
                        </div>
                    </div>`;

            // ── Right Sidebar: Booking Card (only for artist profiles) ──
            if (isArtist && canBook) {
                html += `
                    <div class="vp-sidebar">
                        <div class="booking-card">
                            <div class="booking-card-header">🔒 Book This Artist</div>
                            <div class="booking-card-body">
                                <div class="bc-field">
                                    <label>Select Date</label>
                                    <input type="date" id="bcDate" min="${new Date().toISOString().split('T')[0]}">
                                </div>
                                <div class="bc-field">
                                    <label>Event Type</label>
                                    <select id="bcEventType">
                                        <option value="">Select...</option>
                                        <option value="Wedding">Wedding</option>
                                        <option value="Corporate Event">Corporate Event</option>
                                        <option value="Birthday Party">Birthday Party</option>
                                        <option value="Concert">Concert</option>
                                        <option value="Festival">Festival</option>
                                        <option value="Private Party">Private Party</option>
                                        <option value="College Event">College Event</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="bc-field">
                                    <label>Location</label>
                                    <input type="text" id="bcLocation" placeholder="Event venue / city">
                                </div>
                                <div class="bc-field">
                                    <label>Duration</label>
                                    <select id="bcDuration">
                                        <option value="">Select...</option>
                                        <option value="1 Hour">1 Hour</option>
                                        <option value="2 Hours">2 Hours</option>
                                        <option value="3 Hours">3 Hours</option>
                                        <option value="Half Day">Half Day</option>
                                        <option value="Full Day">Full Day</option>
                                    </select>
                                </div>
                                <div class="bc-field">
                                    <label>Audience Size (Optional)</label>
                                    <input type="text" id="bcAudience" placeholder="e.g. 100-200">
                                </div>

                                <div class="bc-price-box" id="bcPriceBox">
                                    <div class="bc-price-row"><span>Artist Performance</span><span>₹${artistFee.toLocaleString('en-IN')}</span></div>
                                    <div class="bc-price-row"><span>Platform & Support</span><span>₹3,000</span></div>
                                    <div class="bc-price-row total"><span>Total Payable</span><span id="bcTotalDisplay">₹${displayPrice.toLocaleString('en-IN')}</span></div>
                                </div>

                                <!-- Optional Add-ons -->
                                <div style="margin:14px 0;">
                                    <label style="font-size:0.82rem;font-weight:700;color:#333;display:block;margin-bottom:8px;">Optional Add-ons</label>
                                    <div class="bc-addon-list" id="bcAddonList">
                                        <label class="bc-addon-item" title="Accommodation arrangements for the artist">
                                            <input type="checkbox" id="bcAddonAccommodation" onchange="recalcSidebarPrice()">
                                            <span class="bc-addon-label">🏨 Accommodation</span>
                                            <span class="bc-addon-price" id="bcAddonAccPrice">₹5,000</span>
                                        </label>
                                        <label class="bc-addon-item" title="Transport arrangements for the artist">
                                            <input type="checkbox" id="bcAddonTransport" onchange="recalcSidebarPrice()">
                                            <span class="bc-addon-label">🚗 Transport</span>
                                            <span class="bc-addon-price" id="bcAddonTrnPrice">₹3,000</span>
                                        </label>
                                        <label class="bc-addon-item" title="Security personnel for the event">
                                            <input type="checkbox" id="bcAddonSecurity" onchange="recalcSidebarPrice()">
                                            <span class="bc-addon-label">🛡️ Security</span>
                                            <span class="bc-addon-price" id="bcAddonSecPrice">₹4,000</span>
                                        </label>
                                    </div>
                                </div>

                                <div class="bc-advance-box" id="bcAdvanceBox">
                                    <strong>Advance Payable Today:</strong><br>
                                    <span id="bcAdvanceDisplay">₹${((artistFee * 0.5) + 3000).toLocaleString('en-IN')}</span>
                                    <span style="font-size:0.72rem;color:#666;display:block;margin-top:2px;">50% Artist Fee + Platform Fee + Add-ons</span>
                                </div>
                                <div style="font-size:0.82rem;color:#666;margin:6px 0 12px;">
                                    <strong>Remaining After Event:</strong> <span id="bcRemainingDisplay">₹${(artistFee * 0.5).toLocaleString('en-IN')}</span>
                                </div>

                                <div class="bc-trust">
                                    <div class="bc-trust-item"><span class="icon">✔</span> Secure Escrow</div>
                                    <div class="bc-trust-item"><span class="icon">✔</span> Verified Booking</div>
                                    <div class="bc-trust-item"><span class="icon">✔</span> Dispute Protection</div>
                                </div>

                                <button class="bc-submit-btn" onclick="proceedToBooking()">Pay Advance Securely</button>
                            </div>
                        </div>
                    </div>`;
            } else if (isArtist) {
                // Non-organizer viewing artist — show info card
                html += `
                    <div class="vp-sidebar">
                        <div class="booking-card">
                            <div class="booking-card-header">ℹ️ About This Artist</div>
                            <div class="booking-card-body" style="text-align:center;padding:24px;">
                                <p style="font-size:0.88rem;color:#555;">Sign in as an organizer to book this artist.</p>
                                ${artistFee > 0 ? `<p style="margin-top:12px;font-size:1.1rem;font-weight:700;color:#0a66c2;">Starting from ₹${displayPrice.toLocaleString('en-IN')}</p>` : ''}
                            </div>
                        </div>
                    </div>`;
            }

            html += '</div></div>'; // close vp-layout + vp-shell

            container.innerHTML = html;
            if (hasFullProfile) {
                loadMediaWall(profile.user_id);
            } else {
                // Show empty media wall for users without profiles
                var mw = document.getElementById('mediaWall');
                if (mw) mw.innerHTML = '<div class="mw-empty"><div class="mw-empty-icon">📷</div><div class="mw-empty-title">No content yet</div><div class="mw-empty-sub">This user hasn\'t added any media.</div></div>';
            }

            // Load pricing data
            if (isArtist && canBook) {
                loadPricingData();
            }
        }

        var addonPrices = { accommodation: 5000, transport: 3000, security: 4000 };

        async function loadPricingData() {
            try {
                pricingData = await apiRequest('/bookings/calculate-price?artist_id=' + currentUserId);
                // Load actual add-on defaults
                if (pricingData && pricingData.default_addon_prices) {
                    addonPrices = pricingData.default_addon_prices;
                }
                // Update displayed add-on prices
                updateAddonPriceLabels();
            } catch (e) {
                console.error('Failed to load pricing:', e);
            }
        }

        function updateAddonPriceLabels() {
            var ids = [
                ['bcAddonAccPrice', 'bmAddonAccPrice', addonPrices.accommodation],
                ['bcAddonTrnPrice', 'bmAddonTrnPrice', addonPrices.transport],
                ['bcAddonSecPrice', 'bmAddonSecPrice', addonPrices.security],
            ];
            ids.forEach(function(x) {
                var e1 = document.getElementById(x[0]);
                var e2 = document.getElementById(x[1]);
                var label = '₹' + (x[2] || 0).toLocaleString('en-IN');
                if (e1) e1.textContent = label;
                if (e2) e2.textContent = label;
            });
        }

        function getSelectedAddons() {
            // Pull from whichever set of checkboxes exists (sidebar or modal)
            var accSidebar = document.getElementById('bcAddonAccommodation');
            var trnSidebar = document.getElementById('bcAddonTransport');
            var secSidebar = document.getElementById('bcAddonSecurity');
            var accModal = document.getElementById('bmAddonAccommodation');
            var trnModal = document.getElementById('bmAddonTransport');
            var secModal = document.getElementById('bmAddonSecurity');
            return {
                accommodation: (accSidebar && accSidebar.checked) || (accModal && accModal.checked),
                transport: (trnSidebar && trnSidebar.checked) || (trnModal && trnModal.checked),
                security: (secSidebar && secSidebar.checked) || (secModal && secModal.checked),
            };
        }

        function calcPricing(addons) {
            var artistFee = pricingData ? pricingData.artist_fee : (currentProfile ? currentProfile.min_price || 0 : 0);
            var platformFee = 3000;
            var addonTotal = 0;
            if (addons.accommodation) addonTotal += addonPrices.accommodation;
            if (addons.transport) addonTotal += addonPrices.transport;
            if (addons.security) addonTotal += addonPrices.security;
            var total = artistFee + platformFee + addonTotal;
            var advance = (artistFee * 0.5) + platformFee + addonTotal;
            var remaining = total - advance;
            return { artistFee: artistFee, platformFee: platformFee, addonTotal: addonTotal, total: total, advance: advance, remaining: remaining };
        }

        function recalcSidebarPrice() {
            var addons = getSelectedAddons();
            var p = calcPricing(addons);
            // Update sidebar price box
            var priceBox = document.getElementById('bcPriceBox');
            if (priceBox) {
                var html = '<div class="bc-price-row"><span>Artist Performance</span><span>₹' + p.artistFee.toLocaleString('en-IN') + '</span></div>';
                html += '<div class="bc-price-row"><span>Platform & Support</span><span>₹3,000</span></div>';
                if (addons.accommodation) html += '<div class="bc-price-row"><span>🏨 Accommodation</span><span>₹' + addonPrices.accommodation.toLocaleString('en-IN') + '</span></div>';
                if (addons.transport) html += '<div class="bc-price-row"><span>🚗 Transport</span><span>₹' + addonPrices.transport.toLocaleString('en-IN') + '</span></div>';
                if (addons.security) html += '<div class="bc-price-row"><span>🛡️ Security</span><span>₹' + addonPrices.security.toLocaleString('en-IN') + '</span></div>';
                html += '<div class="bc-price-row total"><span>Total Payable</span><span>₹' + p.total.toLocaleString('en-IN') + '</span></div>';
                priceBox.innerHTML = html;
            }
            var advEl = document.getElementById('bcAdvanceDisplay');
            if (advEl) advEl.textContent = '₹' + p.advance.toLocaleString('en-IN');
            var remEl = document.getElementById('bcRemainingDisplay');
            if (remEl) remEl.textContent = '₹' + p.remaining.toLocaleString('en-IN');
        }

        /* ── Toggle info panel ── */
        function toggleInfoPanel() {
            var panel = document.getElementById('infoPanel');
            var text = document.getElementById('infoToggleText');
            if (panel.classList.contains('open')) { panel.classList.remove('open'); text.textContent = 'Show more details ▾'; }
            else { panel.classList.add('open'); text.textContent = 'Hide details ▴'; }
        }

        /* ═══════════════════════════════════════
           BOOKING MODAL — Multi-step
           ═══════════════════════════════════════ */
        function openBookingModal() {
            bookingStep = 1;
            updateBookingStep();
            document.getElementById('bookingModalOverlay').classList.add('open');
            // Pre-fill from sidebar card if available
            var bcDate = document.getElementById('bcDate');
            if (bcDate && bcDate.value) document.getElementById('bmEventDate').value = bcDate.value;
            var bcType = document.getElementById('bcEventType');
            if (bcType && bcType.value) document.getElementById('bmEventType').value = bcType.value;
            var bcLoc = document.getElementById('bcLocation');
            if (bcLoc && bcLoc.value) document.getElementById('bmLocation').value = bcLoc.value;
            var bcDur = document.getElementById('bcDuration');
            if (bcDur && bcDur.value) document.getElementById('bmDuration').value = bcDur.value;
            var bcAud = document.getElementById('bcAudience');
            if (bcAud && bcAud.value) document.getElementById('bmAudienceSize').value = bcAud.value;
            // Sync add-on checkboxes from sidebar to modal
            var accSrc = document.getElementById('bcAddonAccommodation');
            var trnSrc = document.getElementById('bcAddonTransport');
            var secSrc = document.getElementById('bcAddonSecurity');
            if (accSrc) document.getElementById('bmAddonAccommodation').checked = accSrc.checked;
            if (trnSrc) document.getElementById('bmAddonTransport').checked = trnSrc.checked;
            if (secSrc) document.getElementById('bmAddonSecurity').checked = secSrc.checked;
        }

        function closeBookingModal() {
            document.getElementById('bookingModalOverlay').classList.remove('open');
        }

        function proceedToBooking() {
            // Fill modal from sidebar card and open
            openBookingModal();
        }

        var selectedPayMethod = 'upi';
        var lastBookingResult = null;

        function selectPayMethod() {
            var radios = document.querySelectorAll('input[name="paymentMethod"]');
            radios.forEach(function(r) {
                var lbl = r.closest('label');
                if (r.checked) {
                    selectedPayMethod = r.value;
                    lbl.style.borderColor = '#0a66c2';
                    lbl.style.background = '#f0f7ff';
                } else {
                    lbl.style.borderColor = '#e0e0e0';
                    lbl.style.background = '#fff';
                }
            });
        }

        function updateBookingStep() {
            document.querySelectorAll('.bm-step').forEach(function(s) { s.classList.remove('active'); });
            document.getElementById('bmStep' + bookingStep).classList.add('active');

            for (var i = 1; i <= 4; i++) {
                var dot = document.getElementById('dot' + i);
                dot.classList.remove('active', 'done');
                if (i < bookingStep) dot.classList.add('done');
                else if (i === bookingStep) dot.classList.add('active');
            }
            document.getElementById('line1').classList.toggle('done', bookingStep > 1);
            document.getElementById('line2').classList.toggle('done', bookingStep > 2);
            document.getElementById('line3').classList.toggle('done', bookingStep > 3);

            document.getElementById('bmBackBtn').style.display = (bookingStep > 1 && bookingStep < 4) ? 'inline-block' : 'none';
            var nextBtn = document.getElementById('bmNextBtn');
            if (bookingStep === 1) { nextBtn.textContent = 'Next: Review Price'; nextBtn.className = 'bm-btn bm-btn-primary'; nextBtn.style.display = ''; }
            else if (bookingStep === 2) { nextBtn.textContent = 'Proceed to Pay'; nextBtn.className = 'bm-btn bm-btn-success'; nextBtn.style.display = ''; }
            else if (bookingStep === 3) { nextBtn.textContent = 'Confirm & Pay'; nextBtn.className = 'bm-btn bm-btn-success'; nextBtn.style.display = ''; }

            if (bookingStep === 1) {

                var loc = document.getElementById('bmLocation').value;
                if (!date || !type || !loc) {
                    showNotification('Please fill in Date, Event Type, and Location', 'error');
                    return;

                buildPriceSummary();
                bookingStep = 2;
                updateBookingStep();
            } else if (bookingStep === 2) {
                var addons = {
                    accommodation: document.getElementById('bmAddonAccommodation').checked,
                    transport: document.getElementById('bmAddonTransport').checked,
                    security: document.getElementById('bmAddonSecurity').checked,
                };
                var p = calcPricing(addons);
                document.getElementById('bmPayAmountDisplay').textContent = '₹' + p.advance.toLocaleString('en-IN');

                updateBookingStep();
            } else if (bookingStep === 3) {
                submitBooking();
            } else if (bookingStep === 4) {
                closeBookingModal();
            }
        }

            if (bookingStep > 1 && bookingStep < 4) {

        let allPosts = [];
        let currentFilter = 'all';

        async function loadMediaWall(userId) {
            try {
                const posts = await apiRequest('/posts?user_id=' + userId + '&limit=100');
                allPosts = posts || [];
                renderMedia('all');
            } catch (err) {
                document.getElementById('mediaWall').innerHTML = '<div class="mw-empty"><div class="mw-empty-icon">⚠️</div><div class="mw-empty-title">Could not load content</div></div>';
            }
        }

        function filterMedia(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.mw-tab').forEach(function(t) { t.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            renderMedia(filter);
        }

        function renderMedia(filter) {
            var wall = document.getElementById('mediaWall');
            var countEl = document.getElementById('mediaCount');
            var items = [];
            allPosts.forEach(function(post) {
                var mediaUrls = [];
                if (post.media_urls) {
                    try { mediaUrls = typeof post.media_urls === 'string' ? JSON.parse(post.media_urls) : post.media_urls; } catch(e) {}
                }
                if (mediaUrls.length > 0) {
                    mediaUrls.forEach(function(url) {
                        var isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(url);
                        var isVideo = /\.(mp4|webm|ogg|mov)$/i.test(url);
                        if (isImage) items.push({ type: 'image', url: url, caption: post.content, likes: post.likes_count||0, comments: post.comments_count||0, date: post.created_at });
                        else if (isVideo) items.push({ type: 'video', url: url, caption: post.content, likes: post.likes_count||0, comments: post.comments_count||0, date: post.created_at });
                    });
                } else if (post.content && post.media_type !== 'image' && post.media_type !== 'video') {
                    items.push({ type: 'text', url: null, caption: post.content, likes: post.likes_count||0, comments: post.comments_count||0, date: post.created_at });
                }
            });

            var filtered = items;
            if (filter === 'image') filtered = items.filter(function(i) { return i.type === 'image'; });
            else if (filter === 'video') filtered = items.filter(function(i) { return i.type === 'video'; });
            allMediaItems = filtered.filter(function(i) { return i.type !== 'text'; });
            if (countEl) countEl.textContent = ' · ' + filtered.length + ' item' + (filtered.length !== 1 ? 's' : '');

            if (filtered.length === 0) {
                var emptyLabel = filter === 'image' ? 'photos' : (filter === 'video' ? 'videos' : 'posts');
                wall.innerHTML = '<div class="mw-empty"><div class="mw-empty-icon">📷</div><div class="mw-empty-title">No ' + emptyLabel + ' yet</div></div>';
                return;
            }
            var html = '<div class="mw-grid">';
            filtered.forEach(function(item) {
                if (item.type === 'image') {
                    var idx = allMediaItems.indexOf(item);
                    html += '<div class="mw-item" onclick="openLightbox(' + idx + ')"><img src="' + escapeHtml(item.url) + '" alt="Photo" loading="lazy">' + buildCaptionOverlay(item) + '</div>';
                } else if (item.type === 'video') {
                    var idx2 = allMediaItems.indexOf(item);
                    html += '<div class="mw-item" onclick="openLightbox(' + idx2 + ')"><video src="' + escapeHtml(item.url) + '" preload="metadata" muted></video><div class="mw-play-overlay"><div class="mw-play-btn"></div></div>' + buildCaptionOverlay(item) + '</div>';
                } else if (item.type === 'text') {
                    html += '<div class="mw-text-item"><div class="mw-text-content">' + escapeHtml(item.caption) + '</div><div class="mw-text-date">' + formatDate(item.date) + '</div></div>';
                }
            });
            html += '</div>';
            wall.innerHTML = html;
        }

        function buildCaptionOverlay(item) {
            return '<div class="mw-caption-overlay">' +
                (item.caption ? '<div>' + escapeHtml(item.caption.substring(0, 60)) + '</div>' : '') +
                '<div class="mw-engagement"><span>❤️ ' + item.likes + '</span><span>💬 ' + item.comments + '</span></div></div>';
        }

        /* ═══════════════════════════════════════
           LIGHTBOX
           ═══════════════════════════════════════ */
        function openLightbox(index) { if (index < 0 || index >= allMediaItems.length) return; currentLBIndex = index; document.getElementById('lightbox').classList.add('open'); document.body.style.overflow = 'hidden'; renderLightbox(); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; var vid = document.getElementById('lightbox').querySelector('video'); if (vid) vid.pause(); }
        function lightboxNav(dir) { var n = currentLBIndex + dir; if (n < 0) n = allMediaItems.length - 1; if (n >= allMediaItems.length) n = 0; var vid = document.getElementById('lightboxMedia').querySelector('video'); if (vid) vid.pause(); currentLBIndex = n; renderLightbox(); }
        function renderLightbox() {
            var item = allMediaItems[currentLBIndex]; var m = document.getElementById('lightboxMedia'); var info = document.getElementById('lightboxInfo');
            if (item.type === 'image') m.innerHTML = '<img src="' + escapeHtml(item.url) + '" alt="Photo">'; else if (item.type === 'video') m.innerHTML = '<video src="' + escapeHtml(item.url) + '" controls autoplay></video>';
            info.innerHTML = (item.caption ? '<div class="lightbox-caption">' + escapeHtml(item.caption) + '</div>' : '') + '<div class="lightbox-meta">❤️ ' + item.likes + ' · 💬 ' + item.comments + ' · ' + (currentLBIndex + 1) + '/' + allMediaItems.length + '</div>';
        }
        document.addEventListener('keydown', function(e) { var lb = document.getElementById('lightbox'); if (!lb.classList.contains('open')) return; if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowLeft') lightboxNav(-1); if (e.key === 'ArrowRight') lightboxNav(1); });
        document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });

        /* ═══════════════════════════════════════
           UTILITIES
           ═══════════════════════════════════════ */
        function messageUser(userId, name, category) {
            window.location.href = '/chat?open_user=' + userId + '&name=' + encodeURIComponent(name) + '&category=' + encodeURIComponent(category || '');
        }
        function escapeHtml(text) { if (!text) return ''; var d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
        function formatDate(dateStr) { if (!dateStr) return ''; var d = new Date(dateStr); return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); }

        window.messageUser = messageUser;
        window.filterMedia = filterMedia;
        window.openLightbox = openLightbox;
        window.closeLightbox = closeLightbox;
        window.lightboxNav = lightboxNav;
        window.toggleInfoPanel = toggleInfoPanel;
        window.openBookingModal = openBookingModal;
        window.closeBookingModal = closeBookingModal;
        window.proceedToBooking = proceedToBooking;
        window.bookingStepNext = bookingStepNext;
        window.bookingStepBack = bookingStepBack;
        window.recalcSidebarPrice = recalcSidebarPrice;
    </script>
</body>
</html>
