<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CeleCircle</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/feed.css">
    <link rel="stylesheet" href="/static/common.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <a href="/" class="logo-header">
                    <img src="/static/logos/celevircle-logo.png" alt="celevircle logo" class="logo-brand-image">
                </a>
            </div>
            <nav class="header-nav">
                <a href="/register" class="nav-item-header">
                    <span class="nav-label">Sign Up</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="page-container" style="max-width: 500px; margin: 4rem auto;">
        <div class="card">
            <h1 class="card-title text-center">Login</h1>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" class="form-input" id="password" required>
                        <button type="button" class="password-toggle" id="passwordToggle" onclick="togglePassword('password', 'passwordToggle')">
                            <span class="password-toggle-icon">👁️</span>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            
            <p class="text-center mt-2">
                Don't have an account? <a href="/register.html">Sign up</a>
            </p>
        </div>
    </main>

    <script src="/static/app.js"></script>
    <script>
        function togglePassword(inputId, toggleId) {
            const passwordInput = document.getElementById(inputId);
            const toggleButton = document.getElementById(toggleId);
            const toggleIcon = toggleButton.querySelector('.password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                await login(email, password);
                showNotification('Login successful!', 'success');
                
                // Check if user has a profile (for artists and organizers)
                setTimeout(async () => {
                    const user = getCurrentUser();
                    if (user && (user.role === 'artist' || user.role === 'organizer')) {
                        try {
                            await apiRequest('/users/profiles/me');
                            // Profile exists, go to feed
                            window.location.href = '/feed';
                        } catch (error) {
                            // No profile, redirect to setup
                            if (error.status === 404) {
                                window.location.href = '/setup-profile';
                            } else {
                                window.location.href = '/feed';
                            }
                        }
                    } else {
                        // Admins go directly to feed
                        window.location.href = '/feed';
                    }
                }, 1000);
            } catch (error) {
                showNotification(error.message, 'error');
            }
        });
    </script>
</body>
</html>
