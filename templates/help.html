<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Sales - CeleBook</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #f8fafc;
            color: #111827;
        }

        .contact-header {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
        }

        .contact-header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0.9rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: #111827;
            font-weight: 700;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .brand-text {
            font-size: 1.1rem;
            letter-spacing: -0.01em;
        }

        .back-home {
            color: #2563eb;
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .contact-main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 1rem 4rem;
        }

        .contact-shell {
            max-width: 760px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.04);
            padding: 2rem;
        }

        .contact-title {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.02em;
        }

        .contact-subtitle {
            margin-top: 0.7rem;
            color: #6b7280;
            line-height: 1.6;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.9rem;
            margin-top: 1.5rem;
        }

        .contact-field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .contact-field.full {
            grid-column: 1 / -1;
        }

        .contact-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #374151;
        }

        .contact-input,
        .contact-textarea {
            border: 1px solid #d1d5db;
            border-radius: 10px;
            padding: 0.7rem 0.8rem;
            font-size: 0.92rem;
            font-family: inherit;
            color: #111827;
            background: #fff;
        }

        .contact-textarea {
            min-height: 130px;
            resize: vertical;
        }

        .contact-input:focus,
        .contact-textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }

        .contact-actions {
            margin-top: 1.25rem;
            display: flex;
            justify-content: flex-end;
        }

        .contact-submit {
            border: 1px solid #2563eb;
            background: #2563eb;
            color: #fff;
            border-radius: 999px;
            padding: 0.68rem 1.35rem;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="contact-header">
        <div class="contact-header-inner">
            <a href="/" class="brand">
                <span class="brand-icon">CB</span>
                <span class="brand-text">CeleBook</span>
            </a>
            <a href="/" class="back-home">Back to Home</a>
        </div>
    </header>

    <main class="contact-main">
        <section class="contact-shell">
            <h1 class="contact-title">Contact Sales</h1>
            <p class="contact-subtitle">
                Tell us about your event workflow and our team will help you choose the right CeleBook plan for your organization.
            </p>

            <form class="contact-grid">
                <div class="contact-field">
                    <label class="contact-label" for="fullName">Full Name</label>
                    <input id="fullName" class="contact-input" type="text" placeholder="Alex Chen">
                </div>
                <div class="contact-field">
                    <label class="contact-label" for="workEmail">Work Email</label>
                    <input id="workEmail" class="contact-input" type="email" placeholder="you@company.com">
                </div>
                <div class="contact-field">
                    <label class="contact-label" for="companyName">Company</label>
                    <input id="companyName" class="contact-input" type="text" placeholder="Studio 54 Events">
                </div>
                <div class="contact-field">
                    <label class="contact-label" for="teamSize">Team Size</label>
                    <input id="teamSize" class="contact-input" type="text" placeholder="25">
                </div>
                <div class="contact-field full">
                    <label class="contact-label" for="message">How can we help?</label>
                    <textarea id="message" class="contact-textarea" placeholder="Tell us about your event volume, use case, and timeline."></textarea>
                </div>
                <div class="contact-field full contact-actions">
                    <button type="button" class="contact-submit">Request a Demo</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
