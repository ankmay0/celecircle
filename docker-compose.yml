version: "3.9"

# -----------------------------------------------------------------------------
# Shared blocks to keep service definitions consistent and production-friendly
# -----------------------------------------------------------------------------
x-common-service: &common-service
  restart: unless-stopped
  env_file:
    - .env.production
  networks:
    - celecircle_network
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  deploy:
    resources:
      limits:
        cpus: "1.00"
        memory: 1G
      reservations:
        cpus: "0.25"
        memory: 256M

services:
  # ---------------------------------------------------------------------------
  # Data layer (private, persistent)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - celecircle_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 2G
        reservations:
          cpus: "0.50"
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - celecircle_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  # ---------------------------------------------------------------------------
  # Microservices (private-only; no public ports)
  # ---------------------------------------------------------------------------
  auth-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8001"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  user-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8002"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  booking-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/booking-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8003"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8003/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  payment-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8004"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8004/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8005"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8005/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  news-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/news-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8006"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8006/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  messaging-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/messaging-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8007"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8007/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  analytics-service:
    <<: *common-service
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8008"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8008/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Gateway remains private; Nginx is the only public edge.
  api-gateway:
    <<: *common-service
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      BOOKING_SERVICE_URL: http://booking-service:8003
      PAYMENT_SERVICE_URL: http://payment-service:8004
      ADMIN_SERVICE_URL: http://admin-service:8005
      NEWS_SERVICE_URL: http://news-service:8006
      MESSAGING_SERVICE_URL: http://messaging-service:8007
      ANALYTICS_SERVICE_URL: http://analytics-service:8008
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      news-service:
        condition: service_healthy
      messaging-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Public edge (only component with host-published ports)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - celecircle_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

# Persistent named volumes for stateful services.
volumes:
  postgres_data:
  redis_data:

# Dedicated private network for all service-to-service communication.
networks:
  celecircle_network:
    driver: bridge
